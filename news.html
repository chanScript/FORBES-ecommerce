<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="News & Events — Stay informed about the latest news, updates, and events from Forbes Financial Consultancy Corporation." />
  <title>News & Events — Forbes Financial Consultancy Corporation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eef2ff',100:'#dce7ff',200:'#b8ccff',300:'#8aaaf5',400:'#5c82ec',500:'#3660d9',600:'#2449b8',700:'#1c3899',800:'#163083',900:'#1a3978',950:'#0e2358' },
            accent: { DEFAULT:'#F0A800', light:'#F5BA30', dark:'#D08900' },
            success:'#2ECC71', warning:'#FFCC00', error:'#E53935',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .font-heading { font-family: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif; }
    .text-gradient { background: linear-gradient(135deg, #F0A800, #F5BA30); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-scrolled { background-color: rgba(255,255,255,0.97) !important; box-shadow: 0 1px 12px rgba(0,0,0,0.08); }
    .mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .mobile-menu.open { max-height: 800px; }
    .dropdown-menu { opacity:0; visibility:hidden; transform:translateY(10px); transition:all 0.3s ease; pointer-events:none; }
    .dropdown:hover .dropdown-menu, .dropdown.active .dropdown-menu { opacity:1; visibility:visible; transform:translateY(0); pointer-events:auto; }
    .dropdown button { position: relative; z-index: 52; }
    .dropdown-menu { z-index: 51; }
    .reveal { opacity:0; transform:translateY(30px); transition:opacity 0.8s ease, transform 0.8s ease; }
    .reveal.active { opacity:1; transform:translateY(0); }
  </style>
</head>
<body class="bg-white text-gray-800 antialiased">
  <!-- ====== NAVIGATION (rendered by app.js) ====== -->
  <div id="navbar-container"></div>

  <!-- ====== HERO ====== -->
  <section class="relative pt-32 pb-20 bg-primary-900 overflow-hidden">
    <div class="absolute inset-0">
      <div class="absolute top-20 right-10 w-72 h-72 bg-accent/5 rounded-full blur-3xl"></div>
    </div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <div class="inline-flex items-center gap-2 bg-accent/10 border border-accent/20 rounded-full px-4 py-1.5 mb-6">
        <span class="text-accent text-sm font-medium">Stay Updated</span>
      </div>
      <h1 class="font-heading text-4xl sm:text-5xl lg:text-6xl font-bold text-white mb-4">News &amp; <span class="text-gradient">Events</span></h1>
      <p class="text-gray-400 text-lg max-w-2xl mx-auto">Stay informed about the latest news, updates, and events from Forbes Financial Consultancy Corporation.</p>
    </div>
  </section>

  <!-- ====== EMPTY STATE ====== -->
  <section class="py-20 lg:py-28 bg-white">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center reveal">
      <div class="bg-gray-50 border border-gray-200 rounded-2xl p-12">
        <div class="w-20 h-20 bg-accent/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
          <i data-lucide="newspaper" class="w-10 h-10 text-accent"></i>
        </div>
        <h2 class="font-heading text-2xl font-bold text-primary-900 mb-3">No News Yet</h2>
        <p class="text-gray-500 mb-8">Check back soon for the latest news and updates from Forbes Financial.</p>
        <a href="index.html" class="inline-flex items-center gap-2 bg-accent hover:bg-accent-dark text-primary-900 px-8 py-3.5 rounded-lg font-semibold text-sm uppercase tracking-wide transition-all shadow-lg shadow-accent/25">
          Back to Home
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </a>
      </div>
    </div>
  </section>
  <!-- ====== FOOTER (rendered by app.js) ====== -->
  <div id="footer-container"></div>

  <script src="js/app.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
